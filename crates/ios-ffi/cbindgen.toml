language = "C"
header = "/* ios_rs.h - iOS tunnel C FFI (auto-generated by cbindgen) */"
include_guard = "IOS_RS_H"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
